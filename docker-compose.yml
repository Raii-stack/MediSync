services:
  backend:
    image: ry4nj/medisync-backend:latest
    container_name: medisync-backend-prod
    network_mode: host
    devices:
      - "/dev/ttyS0:/dev/serial0"
      - "/dev/gpiochip0:/dev/gpiochip0"
    user: "0"
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_RAWIO
    volumes:
      - backend-data:/app/data
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ESP32_SERIAL_PORT=/dev/serial0
      - ESP32_BAUD_RATE=115200
      - ESP32_ENABLED=true
      - SYNC_INTERVAL=${SYNC_INTERVAL:-60}
      - ROOM_ASSIGNED=${ROOM_ASSIGNED:-Room TBD}
      - DB_PATH=/app/data/kiosk.db
    restart: always

  frontend:
    image: ry4nj/medisync-frontend:latest
    container_name: medisync-frontend-prod
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:5173"
    networks:
      - medisync-network
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
      - VITE_ADMIN_PASSWORD=${VITE_ADMIN_PASSWORD}

  hardware-service:
    image: ry4nj/medisync-hardware:latest
    container_name: medisync-hardware
    network_mode: host # shares network with backend (localhost:3001)
    privileged: true # required for RPi GPIO access
    devices:
      - "/dev/gpiochip0:/dev/gpiochip0"
      - "/dev/i2c-1:/dev/i2c-1" # required for MAX30102
      - "/dev/i2c-3:/dev/i2c-3" # required for MLX90614 (software I2C)
    environment:
      - BACKEND_URL=http://localhost:3001
      - MLX_I2C_BUS=3 # Software I2C bus number for Thermal Sensor
      # Vitals LED (R + G channels)
      - LED_R_PIN=17
      - LED_G_PIN=27
      # RFID Status LED (R + G + B channels)
      - RFID_LED_R_PIN=23
      - RFID_LED_G_PIN=24
      - RFID_LED_B_PIN=25
    restart: always
    depends_on:
      - backend

networks:
  medisync-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
