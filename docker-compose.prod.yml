version: '3.8'

services:
  backend:
    build:
      context: ./Kiosk/Backend
      dockerfile: Dockerfile.prod
      args:
        - NODE_ENV=production
    container_name: medisync-backend-prod
    ports:
      - "3001:3001"
    privileged: true
    volumes:
      - backend-data:/app/data
      - /run/dbus:/run/dbus # Required for WiFi management via NetworkManager
      - /dev/gpiochip0:/dev/gpiochip0
    environment:
      - NODE_ENV=production
      - KIOSK_ID=${KIOSK_ID:-kiosk-001}
      - CLINIC_SOCKET_URL=${CLINIC_SOCKET_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DB_PATH=/app/data/kiosk.db
    restart: always
    networks:
      - medisync-network

  frontend:
    build:
      context: ./Kiosk/Frontend
      dockerfile: Dockerfile.prod
      args:
        - NODE_ENV=production
    container_name: medisync-frontend-prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:5173" # Serve on HTTP port 80 (or 443 for HTTPS)
    networks:
      - medisync-network
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=/api

networks:
  medisync-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
